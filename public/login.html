<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: linear-gradient(135deg, #0b1220, #0f1b2d);
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .box {
            background: rgba(255,255,255,0.06);
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            width: 330px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        h2 {
            margin-top: 0;
            color: #dbeafe;
        }

        input {
            width: 100%;
            padding: 11px;
            margin-top: 10px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(0,0,0,0.25);
            color: #e5e7eb;
            outline: none;
        }

        input:focus {
            border-color: #38bdf8;
        }

        button {
            margin-top: 15px;
            padding: 11px;
            width: 100%;
            background: #38bdf8;
            color: #0b1220;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #0ea5e9;
        }

        .login-hint {
            margin-top: 14px;
            text-align: center;
            font-size: 12px;
            color: #94a3b8;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 10px;
            border-radius: 10px;
            line-height: 1.5;
        }

        .login-hint strong {
            color: #38bdf8;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Dashboard Login</h2>

    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <div class="login-hint">
        Default login: <strong>admin / admin123</strong><br>
        Change it in Settings after your first login
    </div>
</div>

<script>
async function login() {
    const username = document.getElementById("user").value;
    const password = document.getElementById("pass").value;

    try {
        const res = await fetch("/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            credentials: "include",
            body: JSON.stringify({ username, password })
        });

        if (res.ok) {
            window.location.href = "/";
        } else {
            alert("Invalid login");
        }

    } catch (err) {
        console.error("Login error:", err);
        alert("Server error");
    }
}
</script>

</body>
</html>
